[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test categories
markers =
    unit: Unit tests for individual components
    integration: Integration tests between systems
    engine: Game engine tests (ECS, Physics, Graphics)
    game: Game-specific tests (Entities, Systems, States)
    ui: User interface tests
    performance: Performance and benchmark tests

# Test directories
norecursedirs = .* build dist CVS _darcs {arch} *.egg venv env coverage .pytest_cache .benchmarks data

# Display and reporting
addopts = -v --tb=short --strict-markers

# Test discovery
python_paths = src 