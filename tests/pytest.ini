[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test categories
markers =
    unit: Unit tests for individual components
    integration: Integration tests between components
    system: System-level tests for game functionality
    performance: Performance and stress tests
    gameplay: Tests for game mechanics and rules
    physics: Tests for physics simulation
    rendering: Tests for graphics rendering
    input: Tests for input handling
    collision: Tests for collision detection
    network: Tests for network functionality
    audio: Tests for sound and music
    ui: Tests for user interface

# Display settings
addopts = 
    -v
    --tb=short
    --strict-markers
    --durations=5
    --color=yes

# Test selection
norecursedirs = .* build dist CVS _darcs {arch} *.egg venv env virtualenv

# Coverage settings
[coverage:run]
branch = True
source = src

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass 