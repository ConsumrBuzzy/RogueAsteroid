[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test categories
markers =
    unit: Unit tests for individual components
    integration: Integration tests between components
    services: Tests for core game services
    systems: Tests for game systems
    entities: Tests for game entities
    ui: User interface tests
    performance: Performance and benchmark tests

# Test organization
testpaths =
    tests/unit/services     # Service tests
    tests/unit/systems      # System tests
    tests/unit/entities     # Entity tests
    tests/unit/ui          # UI component tests
    tests/integration      # Integration tests
    tests/performance      # Performance tests

# Directories to ignore
norecursedirs = 
    .* 
    build 
    dist 
    CVS 
    _darcs 
    {arch} 
    *.egg 
    venv 
    env 
    coverage 
    .pytest_cache 
    .benchmarks 
    data

# Display and reporting
addopts = 
    -v                  # Verbose output
    --tb=short         # Short traceback format
    --strict-markers   # Strict marker validation
    --cov=src         # Coverage reporting
    --cov-report=html  # HTML coverage report

# Test discovery
python_paths = src 