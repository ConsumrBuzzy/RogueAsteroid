[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test categories
markers =
    unit: Unit tests for individual components and classes
    integration: Integration tests between multiple components
    system: System-level tests for game mechanics
    performance: Performance and benchmark tests
    gameplay: End-to-end gameplay tests
    physics: Tests for physics system and calculations
    rendering: Tests for rendering system
    input: Tests for input handling
    collision: Tests for collision detection
    network: Tests for network functionality
    audio: Tests for audio system
    ui: Tests for user interface

# Display settings
addopts = 
    -v
    --tb=short
    --strict-markers
    --durations=5
    --color=yes

# Test selection
norecursedirs = .* build dist *.egg __pycache__ coverage .benchmarks

# Coverage settings
[coverage:run]
branch = True
source = src

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass 